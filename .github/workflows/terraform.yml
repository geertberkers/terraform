name: Terraform Azure OIDC Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/deploy.yml"

  pull_request:

env:
  TF_VERSION: "1.7.5"

  # 🔐 Azure OIDC auth
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

  TF_VAR_mysql_admin_user: ${{ secrets.MYSQL_ADMIN_USER }}
  TF_VAR_mysql_admin_password: ${{ secrets.MYSQL_ADMIN_PASSWORD }}

  TF_VAR_sql_admin_user: ${{ secrets.SQL_ADMIN_USER }}
  TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}

  TF_VAR_pg_admin_user: ${{ secrets.PG_ADMIN_USER }}
  TF_VAR_pg_admin_password: ${{ secrets.PG_ADMIN_PASSWORD }}
jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # =========================
      # Checkout repo
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # Setup sqlcmd (cached)
      # =========================
      - name: Cache go-sqlcmd
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: cache-sqlcmd
        uses: actions/cache@v4
        with:
          path: ~/bin/sqlcmd
          key: ${{ runner.os }}-sqlcmd-v1.6.0

      - name: Install go-sqlcmd
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.cache-sqlcmd.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/bin
          curl -L https://github.com/microsoft/go-sqlcmd/releases/download/v1.6.0/sqlcmd-v1.6.0-linux-x64.tar.bz2 | tar -xj -C ~/bin
          chmod +x ~/bin/sqlcmd

      - name: Add sqlcmd to PATH
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: echo "$HOME/bin" >> $GITHUB_PATH

      # =========================
      # Setup Terraform
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # =========================
      # Cache Terraform
      # =========================
      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: .terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      # =========================
      # Terraform Init
      # =========================
      - name: Terraform Init
        run: terraform init -input=false -lock-timeout=10m

      # =========================
      # Format check
      # =========================
      - name: Terraform Format
        run: terraform fmt -check -recursive

      # =========================
      # Validate
      # =========================
      - name: Terraform Validate
        run: terraform validate

      # =========================
      # Plan
      # =========================
      - name: Terraform Plan
        run: |
          terraform plan \
            -lock-timeout=10m \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="docker_image_tag=${{ github.sha }}" \
            -out=tfplan


      # =========================
      # Apply ONLY on main branch push
      # =========================
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          terraform apply \
            -lock-timeout=10m \
            -var="docker_image_tag=${{ github.sha }}" \
            -auto-approve tfplan