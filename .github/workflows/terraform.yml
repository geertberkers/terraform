name: Terraform Azure OIDC Deploy

on:
  push:
    branches:
      - main

  pull_request:

env:
  TF_VERSION: "1.7.5"

  # 🔐 Azure OIDC auth
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # =========================
      # Checkout repo
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # Setup Terraform
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # =========================
      # Terraform Init
      # =========================
      - name: Terraform Init
        run: terraform init -input=false -lock-timeout=10m

      # =========================
      # 🔥 IMPORT EXISTING RESOURCES (SAFE, IDEMPOTENT)
      # =========================
      - name: Terraform Import existing Azure resources
        run: |
          terraform init -input=false -lock-timeout=10m

          terraform import \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            module.switzerland.azurerm_resource_group.rg \
            /subscriptions/${{ secrets.ARM_SUBSCRIPTION_ID }}/resourceGroups/rg-switzerland-north || true

          terraform import \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            module.sweden.azurerm_resource_group.rg \
            /subscriptions/${{ secrets.ARM_SUBSCRIPTION_ID }}/resourceGroups/rg-sweden-central || true

      # =========================
      # Format check
      # =========================
      - name: Terraform Format
        run: terraform fmt -check -recursive

      # =========================
      # Validate
      # =========================
      - name: Terraform Validate
        run: terraform validate

      # =========================
      # Plan
      # =========================
      - name: Terraform Plan
        run: |
          terraform plan \
            -lock-timeout=10m \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -out=tfplan

      # =========================
      # Apply ONLY on main branch push
      # =========================
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          terraform apply \
            -lock-timeout=10m \
            -auto-approve tfplan