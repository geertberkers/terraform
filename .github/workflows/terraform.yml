name: Terraform Azure OIDC Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/deploy.yml"

  pull_request:

env:
  TF_VERSION: "1.7.5"

  # 🔐 Azure OIDC auth
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

  TF_VAR_mysql_admin_user: ${{ secrets.MYSQL_ADMIN_USER }}
  TF_VAR_mysql_admin_password: ${{ secrets.MYSQL_ADMIN_PASSWORD }}

  TF_VAR_sql_admin_user: ${{ secrets.SQL_ADMIN_USER }}
  TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}

  TF_VAR_pg_admin_user: ${{ secrets.PG_ADMIN_USER }}
  TF_VAR_pg_admin_password: ${{ secrets.PG_ADMIN_PASSWORD }}
jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # =========================
      # Checkout repo
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # Setup Terraform
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # =========================
      # Terraform Init
      # =========================
      - name: Terraform Init
        run: terraform init -input=false -lock-timeout=10m

      # =========================
      # Format check
      # =========================
      - name: Terraform Format
        run: terraform fmt -check -recursive

      # =========================
      # Validate
      # =========================
      - name: Terraform Validate
        run: terraform validate

      # =========================
      # Plan
      # =========================
      - name: Terraform Plan
        run: |
          terraform plan \
            -lock-timeout=10m \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -out=tfplan

      # =========================
      # Install SQL tools (separate step)
      # =========================
      - name: Install SQL tools
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          sudo apt-get update -y
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      # =========================
      # Apply ONLY on main branch push
      # =========================
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          terraform apply \
            -lock-timeout=10m \
            -auto-approve tfplan