name: Terraform Azure OIDC Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/deploy.yml"

  pull_request:

env:
  TF_VERSION: "1.7.5"

  # 🔐 Azure OIDC auth
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

  TF_VAR_mysql_admin_user: ${{ secrets.MYSQL_ADMIN_USER }}
  TF_VAR_mysql_admin_password: ${{ secrets.MYSQL_ADMIN_PASSWORD }}

  TF_VAR_sql_admin_user: ${{ secrets.SQL_ADMIN_USER }}
  TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}

  TF_VAR_pg_admin_user: ${{ secrets.PG_ADMIN_USER }}
  TF_VAR_pg_admin_password: ${{ secrets.PG_ADMIN_PASSWORD }}
jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # =========================
      # Checkout repo
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # Setup sqlcmd (cached)
      # =========================
      - name: Cache go-sqlcmd
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: cache-sqlcmd
        uses: actions/cache@v4
        with:
          path: ~/bin/sqlcmd
          key: ${{ runner.os }}-sqlcmd-v1.6.0

      - name: Install go-sqlcmd
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.cache-sqlcmd.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/bin
          curl -L https://github.com/microsoft/go-sqlcmd/releases/download/v1.6.0/sqlcmd-v1.6.0-linux-x64.tar.bz2 | tar -xj -C ~/bin
          chmod +x ~/bin/sqlcmd

      - name: Add sqlcmd to PATH
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: echo "$HOME/bin" >> $GITHUB_PATH

      # =========================
      # Setup Terraform
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # =========================
      # Cache Terraform
      # =========================
      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: .terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      # =========================
      # Terraform Init
      # =========================
      - name: Terraform Init
        run: terraform init -input=false -lock-timeout=10m

      # =========================
      # Format check
      # =========================
      - name: Terraform Format
        run: terraform fmt -check -recursive

      # =========================
      # Validate
      # =========================
      - name: Terraform Validate
        run: terraform validate

      # =========================
      # Plan
      # =========================
      - name: Read app version from Gradle
        id: app_version
        run: |
          VERSION_NAME=$(sed -n 's/^version = "\(.*\)"/\1/p' multi-db-backend/build.gradle.kts | head -n 1)
          VERSION_CODE=$(sed -n 's/^val versionCode = \(.*\)/\1/p' multi-db-backend/build.gradle.kts | head -n 1)

          if [ -z "$VERSION_NAME" ] || [ -z "$VERSION_CODE" ]; then
            echo "Failed to read version fields from multi-db-backend/build.gradle.kts"
            exit 1
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Terraform Plan
        run: |
          terraform plan \
            -lock-timeout=10m \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="docker_image_tag=${{ github.sha }}" \
            -var="app_version_name=${{ steps.app_version.outputs.version_name }}" \
            -var="app_version_code=${{ steps.app_version.outputs.version_code }}" \
            -out=tfplan


      # =========================
      # Apply ONLY on main branch push
      # =========================
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          terraform apply \
            -lock-timeout=10m \
            -auto-approve tfplan

      # =========================
      # Deploy Kubernetes Manifests
      # =========================
      - name: Deploy Kubernetes Manifests
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # 1. Setup kubeconfig
          mkdir -p ~/.kube
          terraform output -raw aks_kube_config > ~/.kube/config
          chmod 600 ~/.kube/config
          
          # 2. Extract Terraform outputs for substitution
          export TENANT_ID=$(terraform output -raw tenant_id)
          export KEYVAULT_NAME=$(terraform output -raw key_vault_name)
          
          # 3. Substitute variables in secret-provider-class.yaml
          envsubst < kubernetes/secret-provider-class.yaml > kubernetes/secret-provider-class-tmp.yaml
          mv kubernetes/secret-provider-class-tmp.yaml kubernetes/secret-provider-class.yaml
          
          # 4. Ensure CRDs are installed first
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/secrets-store-csi-driver/master/charts/secrets-store-csi-driver/crds/secrets-store.csi.x-k8s.io_secretproviderclasses.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/secrets-store-csi-driver/master/charts/secrets-store-csi-driver/crds/secrets-store.csi.x-k8s.io_secretproviderclasspodstatuses.yaml
          kubectl wait --for condition=established --timeout=120s crd/secretproviderclasses.secrets-store.csi.x-k8s.io
          
          # 5. Apply Kubernetes manifests
          kubectl apply -f kubernetes/