      - name: Terraform Validate
        run: terraform validate

      # =========================
      # Plan
      # =========================
      - name: Terraform Plan
        run: |
          terraform plan \
            -lock-timeout=10m \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -out=tfplan

      # =========================
      # Apply ONLY on main branch push
      # =========================
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          terraform apply \
            -lock-timeout=10m \
            -auto-approve tfplan