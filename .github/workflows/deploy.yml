name: Build and Deploy Multi-DB Backend to Azure

on:
  push:
    branches: ["main"]
    paths:
      - "multi-db-backend/**"
      - ".github/workflows/deploy.yml"
      - "kubernetes/**"
  pull_request:
    branches: ["main"]
    paths:
      - "multi-db-backend/**"
      - "kubernetes/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/multi-db-backend
  WORKING_DIR: multi-db-backend
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WORKING_DIR }}
          file: ${{ env.WORKING_DIR }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-app-service:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Generate deployment timestamp
        id: timestamp
        run: |
          APP_TIME=$(TZ='Europe/Amsterdam' date +'%Y-%m-%d_%H-%M-%S')
          echo "timestamp=$APP_TIME" >> $GITHUB_OUTPUT

      - name: Get project version
        id: project_version
        run: |
          VERSION=$(grep "version =" ${{ env.WORKING_DIR }}/build.gradle.kts | head -n 1 | cut -d'"' -f2)
          VERSION_CODE=$(grep "val versionCode =" ${{ env.WORKING_DIR }}/build.gradle.kts | head -n 1 | awk '{print $NF}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Set App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "DOCKER_TAG", "value": "${{ github.sha }}", "slotSetting": false },
              { "name": "AZURE_LOG_FILENAME", "value": "app-${{ steps.timestamp.outputs.timestamp }}.log", "slotSetting": false },
              { "name": "APP_VERSION_NAME", "value": "${{ steps.project_version.outputs.version }}", "slotSetting": false },
              { "name": "APP_VERSION_CODE", "value": "${{ steps.project_version.outputs.versionCode }}", "slotSetting": false }
            ]

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Azure Logout
        run: az logout

  deploy-kubernetes:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-terraform-aks-cheap
          cluster-name: cheap-k8s-aks

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Deploy NGINX Ingress
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          # Upgrade or Install NGINX
          helm upgrade --install nginx-ingress ingress-nginx/ingress-nginx \
            --namespace ingress-nginx --create-namespace \
            --set controller.service.type=LoadBalancer \
            --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-resource-group"=rg-terraform-aks-cheap \
            --set controller.service.externalTrafficPolicy=Local

      - name: Deploy Cert-Manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager --create-namespace \
            --version v1.13.1 \
            --set installCRDs=true

      - name: Prepare Manifests (Variable Substitution)
        run: |
          # Fetch Key Vault and Tenant ID via Azure CLI
          export TENANT_ID=$(az account show --query tenantId -o tsv)
          export KEYVAULT_NAME=$(az keyvault list --resource-group rg-terraform-databases-europe --query "[0].name" -o tsv)
          
          echo "Using Tenant ID: $TENANT_ID"
          echo "Using KeyVault: $KEYVAULT_NAME"
          
          # Substitute variables in manifests
          envsubst < kubernetes/secret-provider-class.yaml > kubernetes/secret-provider-class-tmp.yaml
          mv kubernetes/secret-provider-class-tmp.yaml kubernetes/secret-provider-class.yaml

      - name: Apply Secret Store CSI Driver CRDs
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/secrets-store-csi-driver/master/charts/secrets-store-csi-driver/crds/secrets-store.csi.x-k8s.io_secretproviderclasses.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/secrets-store-csi-driver/master/charts/secrets-store-csi-driver/crds/secrets-store.csi.x-k8s.io_secretproviderclasspodstatuses.yaml
          kubectl wait --for condition=established --timeout=120s crd/secretproviderclasses.secrets-store.csi.x-k8s.io

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/cluster-issuer.yaml
          kubectl apply -f kubernetes/secret-provider-class.yaml
          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl apply -f kubernetes/ingress.yaml

      - name: Azure Logout
        run: az logout