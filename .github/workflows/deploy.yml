name: Build and Deploy Multi-DB Backend to Azure

on:
  push:
    branches: ["main"]
    paths:
      - "multi-db-backend/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "multi-db-backend/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/multi-db-backend
  WORKING_DIR: multi-db-backend
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WORKING_DIR }}
          file: ${{ env.WORKING_DIR }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache for Docker BuildKit
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Generate deployment timestamp
        id: timestamp
        run: |
          # Use Amsterdam time for the filename
          APP_TIME=$(TZ='Europe/Amsterdam' date +'%Y-%m-%d_%H-%M-%S')
          echo "timestamp=$APP_TIME" >> $GITHUB_OUTPUT

      - name: Get project version
        id: project_version
        run: |
          # Parse version and versionCode precisely
          VERSION=$(grep "version =" ${{ env.WORKING_DIR }}/build.gradle.kts | head -n 1 | cut -d'"' -f2)
          VERSION_CODE=$(grep "val versionCode =" ${{ env.WORKING_DIR }}/build.gradle.kts | head -n 1 | awk '{print $NF}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT
          # Debug Info
          echo "Successfully parsed Version: $VERSION and Build Code: $VERSION_CODE"

      - name: Set App Settings via CLI
        run: |
          az webapp config appsettings set --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group rg-terraform-app-service-westeurope \
            --settings AZURE_LOG_FILENAME="app-${{ steps.timestamp.outputs.timestamp }}.log" \
                       APP_VERSION_NAME="${{ steps.project_version.outputs.version }}" \
                       APP_VERSION_CODE="${{ steps.project_version.outputs.versionCode }}" \
                       DOCKER_TAG="${{ github.sha }}"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Azure Logout
        run: az logout