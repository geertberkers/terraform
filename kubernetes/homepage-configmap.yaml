apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-html
  namespace: multi-db-app
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GB Coding | Welcome</title>
        <style>
            :root {
                --primary: #6366f1;
                --bg: #0f172a;
                --text: #f8fafc;
            }
            body {
                margin: 0;
                font-family: 'Inter', system-ui, sans-serif;
                background: var(--bg);
                color: var(--text);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                text-align: center;
                overflow: hidden;
            }
            .glass {
                background: rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.05);
                padding: 3rem;
                border-radius: 2rem;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                max-width: 600px;
            }
            h1 {
                font-size: 3.5rem;
                margin-bottom: 1rem;
                background: linear-gradient(to right, #818cf8, #c084fc);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            p {
                font-size: 1.25rem;
                color: #94a3b8;
                line-height: 1.6;
            }
            .badge {
                display: inline-block;
                padding: 0.5rem 1rem;
                background: rgba(99, 102, 241, 0.1);
                color: var(--primary);
                border-radius: 9999px;
                font-weight: 600;
                font-size: 0.875rem;
                margin-bottom: 2rem;
            }
            .glow {
                position: absolute;
                width: 300px;
                height: 300px;
                background: var(--primary);
                filter: blur(150px);
                opacity: 0.2;
                border-radius: 50%;
                z-index: -1;
            }
        </style>
    </head>
    <body>
        <div class="glow"></div>
        <div class="glass">
            <span class="badge">Powered by AKS & Terraform</span>
            <h1>GB Coding</h1>
            <p>Welcome to your new production-ready environment. The infrastructure is live, high-performance, and ready for your code.</p>
            <div style="margin-top: 2rem;">
                <p style="font-size: 0.9rem; color: #64748b;">
                    Kotlin Backend API: <a href="http://aks.gb-coding.nl" style="color: #818cf8; text-decoration: none;">aks.gb-coding.nl</a>
                </p>
            </div>
        </div>
    </body>
    </html>
