apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: multi-db-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: homepage-html
---
apiVersion: v1
kind: Service
metadata:
  name: homepage-service
  namespace: multi-db-app
spec:
  selector:
    app: homepage
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
