apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-db
  namespace: multi-db-app
spec:
  provider: azure
  secretObjects:
    - secretName: db-secrets
      type: Opaque
      data:
        - objectName: postgres-password
          key: postgres-password
        - objectName: mysql-password
          key: mysql-password
        - objectName: sqlserver-password
          key: sqlserver-password
        - objectName: cosmos-connection
          key: cosmos-connection
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "" # Uses the System Identity of AKS
    keyvaultName: "${KEYVAULT_NAME}" # Filled in github actions via envsubst
    tenantId: "${TENANT_ID}" # Filled in github actions via envsubst
    objects: |
      array:
        - |
          objectName: pg-admin-password
          alias: postgres-password
          objectType: secret
        - |
          objectName: mysql-admin-password
          alias: mysql-password
          objectType: secret
        - |
          objectName: sql-admin-password
          alias: sqlserver-password
          objectType: secret
        - |
          objectName: cosmos-connection
          objectType: secret
